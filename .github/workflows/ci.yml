name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-spec:
    name: Validate spec files exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required spec files
        run: |
          test -f spec/protocol-v1.md || (echo "Missing protocol spec" && exit 1)
          test -f spec/module-interface.md || (echo "Missing module interface spec" && exit 1)
          test -f PHILOSOPHY.md || (echo "Missing philosophy" && exit 1)
          echo "All required files present"

  lint-docs:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown files exist
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f docs/architecture.md
          test -f docs/quick-start.md
          echo "Docs OK"
